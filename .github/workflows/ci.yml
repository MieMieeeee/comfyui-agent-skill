name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11"]
    runs-on: ${{ matrix.os }}
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: python -m pip install --upgrade pip uv

      - name: Create virtual environment
        run: uv venv

      - name: Install package (editable) + test deps
        run: uv pip install -e ".[dev]"

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: .\.venv\Scripts\python.exe -m pytest -q scripts/tests

      - name: Run tests (Unix)
        if: runner.os != 'Windows'
        run: .venv/bin/python -m pytest -q scripts/tests

      - name: Build wheel (Unix)
        if: runner.os != 'Windows'
        run: uv pip install wheel && uv pip wheel . -w dist

      - name: Install wheel + smoke CLI (Unix)
        if: runner.os != 'Windows'
        env:
          COMFYUI_SKILL_USER_DATA_ROOT: ${{ github.workspace }}/.ci-user-data
        run: |
          uv pip install dist/*.whl
          .venv/bin/comfyui-skill --help
          .venv/bin/comfyui-skill generate --preflight --workflow z_image_turbo --server http://127.0.0.1:59997

      - name: pipx install from wheel (Unix)
        if: runner.os != 'Windows'
        env:
          PIPX_HOME: ${{ github.workspace }}/.pipx
          PIPX_BIN_DIR: ${{ github.workspace }}/.pipx/bin
          COMFYUI_SKILL_USER_DATA_ROOT: ${{ github.workspace }}/.ci-user-data
        run: |
          uv pip install pipx
          .venv/bin/pipx install dist/*.whl --force
          ${{ github.workspace }}/.pipx/bin/comfyui-skill --help

      - name: uv tool install from wheel (Unix)
        if: runner.os != 'Windows'
        env:
          COMFYUI_SKILL_USER_DATA_ROOT: ${{ github.workspace }}/.ci-user-data
        run: |
          uv tool install dist/*.whl
          comfyui-skill --help
